name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Static checks
        run: npm run check

  deploy-staging:
    name: Deploy staging
    needs: verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_APP_URL }}
    steps:
      - name: Trigger staging deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "STAGING_DEPLOY_HOOK_URL is not configured; skipping provider deploy."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy production
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_APP_URL }}
    steps:
      - name: Trigger production deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "PRODUCTION_DEPLOY_HOOK_URL is not configured; skipping provider deploy."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
